name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: api/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Extraer versión
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Instalar dependencias frontend
        working-directory: ui
        run: npm ci

      - name: Construir frontend
        working-directory: ui
        env:
          VITE_API_URL: http://localhost:8010
        run: npm run build

      - name: Construir imagen Docker API
        run: docker build -t hce-farmacia-api:${{ steps.version.outputs.VERSION }} ./api

      - name: Construir imagen Docker UI
        run: |
          docker build \
            --build-arg VITE_API_URL=http://localhost:8010 \
            -t hce-farmacia-ui:${{ steps.version.outputs.VERSION }} ./ui

      - name: Publicar release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "HCE Farmacia ${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
