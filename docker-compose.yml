services:
  farm-api:
    build: ./api
    container_name: ${COMPOSE_PROJECT_NAME:-farmacia}-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${DOCKER_API_PORT:-8010}
      ALLOWED_ORIGIN: ${DOCKER_ALLOWED_ORIGIN:-}
      APP_TZ: ${APP_TZ:-America/Bogota}
      TZ: ${APP_TZ:-America/Bogota}
      PRINTER_TERMICA: ${PRINTER_TERMICA:-}
      CUPS_SERVER: /run/cups/cups.sock
      PRINTER_MODE: ${PRINTER_MODE:-cups}
      PRINTER_HTTP_URL: ${PRINTER_HTTP_URL:-}
    volumes:
      - /run/cups/cups.sock:/run/cups/cups.sock
    ports:
      - "${DOCKER_API_PORT:-8010}:${DOCKER_API_PORT:-8010}"

  farm-ui:
    build:
      context: ./ui
      args:
        VITE_API_URL: ${DOCKER_VITE_API_URL:-http://localhost:8010}
    container_name: ${COMPOSE_PROJECT_NAME:-farmacia}-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-8080}:80"
